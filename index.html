
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jacinda's Budget Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="module" id="firebase-init">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
    const firebaseConfig = {
      apiKey: "AIzaSyDDZVGlwYLLJFkmXka2Uvzw0FU2haEZB3Q",
      authDomain: "jacinda-budget.firebaseapp.com",
      projectId: "jacinda-budget",
      storageBucket: "jacinda-budget.firebasestorage.app",
      messagingSenderId: "948399063791",
      appId: "1:948399063791:web:5a01f474c83b47c367511a"
    };
 
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
 
    window._db = db;
    window._firestoreReady = true;
    window._setDoc = setDoc;
    window._doc = doc;
    window._getDoc = getDoc;
    window.dispatchEvent(new Event("firestore-ready"));
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #f5f0eb 0%, #ede8e0 100%); min-height: 100vh; font-family: Georgia, serif; }
    input:focus { outline: none; }
    button { cursor: pointer; }
    .saving-indicator { position: fixed; bottom: 16px; right: 16px; background: #3d6b55; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-family: sans-serif; opacity: 0; transition: opacity 0.3s; z-index: 999; }
    .saving-indicator.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="saving-indicator" id="saving-indicator">✓ Saved</div>
 
  <script type="text/babel">
    const { useState, useCallback, useEffect, useRef } = React;
 
    const FORTNIGHTLY_INCOME = 1900;
 
    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }
 
    function formatDateShort(d) {
      return new Date(d).toLocaleDateString("en-AU", { day: "numeric", month: "short" });
    }
 
    function formatDateInput(d) {
      return new Date(d).toISOString().split("T")[0];
    }
 
    function getFortnight(startDateStr, offset = 0) {
      const start = addDays(new Date(startDateStr), offset * 14);
      const end = addDays(start, 13);
      return { start, end, label: `${formatDateShort(start)} – ${formatDateShort(end)}` };
    }
 
    const DEFAULT_ACCOUNT_TEMPLATE = [
      {
        id: "needs", label: "Account 1: Household & Bills", color: "#4a7c59",
        items: [
          { id: "mortgage", label: "Mortgage", amount: 700, note: "Fixed shared amount" },
          { id: "groceries", label: "Groceries & Essentials", amount: 200, note: "Food & household" },
          { id: "utilities", label: "Utilities", amount: 45, note: "Elec/Gas/Water" },
          { id: "phone", label: "Phone & Internet", amount: 40, note: "Mobile + NBN share" },
          { id: "petrol", label: "Petrol / Transport", amount: 15, note: "Commuting & school" },
        ],
      },
      {
        id: "wants", label: "Account 2: Personal & Spending", color: "#7c5a8a",
        items: [
          { id: "afterpay", label: "Afterpay", amount: 282.84, note: "Current schedule" },
          { id: "gym", label: "Gym Membership", amount: 70, note: "Direct debit" },
          { id: "hair", label: "Hair Sinking Fund", amount: 40, note: "Lean fortnight" },
          { id: "pocket", label: "Kids' Pocket Money", amount: 40, note: "$20 each" },
          { id: "clothing", label: "Kids' Clothing & Misc", amount: 25, note: "Sinking fund" },
          { id: "discretionary", label: "General Discretionary", amount: 200, note: "Coffees, play centres" },
        ],
      },
      {
        id: "savings", label: "Account 3: Savings", color: "#7a6a4a",
        items: [
          { id: "emergency", label: "Emergency Buffer", amount: 200, note: "Building to $2,000" },
        ],
      },
    ];
 
    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
 
    function formatCurrency(val) {
      return "$" + Number(val).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
 
    function expenseFortnight(dateStr, fortnights) {
      if (!dateStr) return 0;
      const d = new Date(dateStr);
      for (let i = 0; i < fortnights.length; i++) {
        if (d >= fortnights[i].start && d <= fortnights[i].end) return i;
      }
      return 0;
    }
 
    function showSaved() {
      const el = document.getElementById("saving-indicator");
      if (el) { el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2000); }
    }
 
    async function saveToFirestore(data) {
      try {
        if (window._db && window._setDoc && window._doc) {
          await window._setDoc(window._doc(window._db, "budget", "main"), data);
          showSaved();
        }
      } catch (e) { console.error("Save error:", e); }
    }
 
    async function loadFromFirestore() {
      try {
        if (window._db && window._getDoc && window._doc) {
          const snap = await window._getDoc(window._doc(window._db, "budget", "main"));
          if (snap.exists()) return snap.data();
        }
      } catch (e) { console.error("Load error:", e); }
      return null;
    }
 
    function ConfirmDialog({ item, accountColor, onConfirm, onCancel }) {
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
          <div style={{ background: "white", borderRadius: 16, padding: "28px 24px", maxWidth: 340, width: "100%", boxShadow: "0 8px 40px rgba(0,0,0,0.2)", textAlign: "center" }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>🔁</div>
            <h3 style={{ marginBottom: 8, fontSize: 17, fontFamily: "sans-serif", color: "#222" }}>Apply to all fortnights?</h3>
            <p style={{ marginBottom: 6, fontSize: 14, color: "#555", fontFamily: "sans-serif" }}><strong>{item.label}</strong></p>
            <p style={{ marginBottom: 20, fontSize: 13, color: "#888", fontFamily: "sans-serif" }}>Set to <strong style={{ color: accountColor }}>{formatCurrency(item.amount)}</strong> as your new ongoing amount.</p>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={onCancel} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "1.5px solid #ddd", background: "white", fontSize: 14, fontFamily: "sans-serif", color: "#666" }}>Cancel</button>
              <button onClick={onConfirm} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "none", background: accountColor, fontSize: 14, fontFamily: "sans-serif", color: "white", fontWeight: "bold" }}>Yes, apply</button>
            </div>
          </div>
        </div>
      );
    }
 
    function DateEditModal({ fortnights, onSave, onCancel }) {
      const [startDate, setStartDate] = useState(formatDateInput(fortnights[0].start));
      const preview = [0, 1].map(i => getFortnight(startDate, i));
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }}>
          <div style={{ background: "white", borderRadius: 16, padding: "28px 24px", maxWidth: 360, width: "100%", boxShadow: "0 8px 40px rgba(0,0,0,0.2)" }}>
            <h3 style={{ marginBottom: 6, fontSize: 17, fontFamily: "sans-serif", color: "#222" }}>📅 Edit Fortnight Dates</h3>
            <p style={{ marginBottom: 18, fontSize: 13, color: "#888", fontFamily: "sans-serif" }}>Set the start date of your first fortnight.</p>
            <label style={{ fontSize: 12, fontFamily: "sans-serif", color: "#555", display: "block", marginBottom: 6 }}>Fortnight 1 starts on:</label>
            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "1.5px solid #3d6b55", borderRadius: 8, fontSize: 14, fontFamily: "sans-serif", marginBottom: 18 }} />
            <div style={{ background: "#f7f4f0", borderRadius: 10, padding: "12px 14px", marginBottom: 20 }}>
              {preview.map((f, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", marginBottom: i === 0 ? 6 : 0 }}>
                  <span style={{ fontSize: 12, fontFamily: "sans-serif", color: "#666" }}>Fortnight {i + 1}</span>
                  <span style={{ fontSize: 12, fontFamily: "sans-serif", color: "#333", fontWeight: "bold" }}>{f.label}</span>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={onCancel} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "1.5px solid #ddd", background: "white", fontSize: 14, fontFamily: "sans-serif", color: "#666" }}>Cancel</button>
              <button onClick={() => onSave(startDate)} style={{ flex: 1, padding: "11px 0", borderRadius: 9, border: "none", background: "#3d6b55", fontSize: 14, fontFamily: "sans-serif", color: "white", fontWeight: "bold" }}>Save</button>
            </div>
          </div>
        </div>
      );
    }
 
    function App() {
      const [fortnightStart, setFortnightStart] = useState("2026-06-11");
      const [fortnightAccounts, setFortnightAccounts] = useState([deepClone(DEFAULT_ACCOUNT_TEMPLATE), deepClone(DEFAULT_ACCOUNT_TEMPLATE)]);
      const [upcomingExpenses, setUpcomingExpenses] = useState([{ id: "1", description: "", amount: "", date: "" }]);
      const [editingCell, setEditingCell] = useState(null);
      const [splitView, setSplitView] = useState(false);
      const [activeFortnight, setActiveFortnight] = useState(0);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [lockedItems, setLockedItems] = useState(new Set());
      const [justLocked, setJustLocked] = useState(null);
      const [showDateEdit, setShowDateEdit] = useState(false);
      const [loaded, setLoaded] = useState(false);
      const [dbReady, setDbReady] = useState(false);
      const saveTimer = useRef(null);
 
      // Wait for Firestore to be ready
      useEffect(() => {
        if (window._firestoreReady) {
          setDbReady(true);
        } else {
          window.addEventListener("firestore-ready", () => setDbReady(true));
        }
      }, []);
 
      // Load data from Firestore on startup
      useEffect(() => {
        if (!dbReady) return;
        loadFromFirestore().then(data => {
          if (data) {
            if (data.fortnightStart) setFortnightStart(data.fortnightStart);
            if (data.fortnightAccounts) setFortnightAccounts(data.fortnightAccounts);
            if (data.upcomingExpenses) setUpcomingExpenses(data.upcomingExpenses);
            if (data.lockedItems) setLockedItems(new Set(data.lockedItems));
          }
          setLoaded(true);
        });
      }, [dbReady]);
 
      // Auto-save whenever state changes
      const scheduleSave = useCallback((newState) => {
        if (!loaded) return;
        if (saveTimer.current) clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
          saveToFirestore(newState);
        }, 1000);
      }, [loaded]);
 
      const fortnights = [0, 1].map(i => getFortnight(fortnightStart, i));
 
      const updateItemLabel = useCallback((fn, accountId, itemId, newLabel) => {
        setFortnightAccounts(prev => {
          const next = deepClone(prev);
          [0, 1].forEach(f => {
            const acc = next[f].find(a => a.id === accountId);
            if (acc) { const item = acc.items.find(i => i.id === itemId); if (item) item.label = newLabel; }
          });
          scheduleSave({ fortnightStart, fortnightAccounts: next, upcomingExpenses, lockedItems: [...lockedItems] });
          return next;
        });
      }, [fortnightStart, upcomingExpenses, lockedItems, scheduleSave]);
 
      const updateItemAmount = useCallback((fn, accountId, itemId, value, applyAll = false) => {
        const newVal = parseFloat(value) || 0;
        setFortnightAccounts(prev => {
          const next = deepClone(prev);
          (applyAll ? [0, 1] : [fn]).forEach(f => {
            const acc = next[f].find(a => a.id === accountId);
            if (acc) { const item = acc.items.find(i => i.id === itemId); if (item) item.amount = newVal; }
          });
          scheduleSave({ fortnightStart, fortnightAccounts: next, upcomingExpenses, lockedItems: [...lockedItems] });
          return next;
        });
        if (applyAll) {
          const key = `${accountId}-${itemId}`;
          setLockedItems(prev => {
            const next = new Set([...prev, key]);
            scheduleSave({ fortnightStart, fortnightAccounts, upcomingExpenses, lockedItems: [...next] });
            return next;
          });
          setJustLocked(key);
          setTimeout(() => setJustLocked(null), 2000);
        }
      }, [fortnightStart, upcomingExpenses, lockedItems, scheduleSave]);
 
      const handleLockClick = (fn, accountId, itemId) => setConfirmDialog({ fn, accountId, itemId });
 
      const handleConfirmLock = () => {
        if (confirmDialog) {
          const { fn, accountId, itemId } = confirmDialog;
          const acc = fortnightAccounts[fn].find(a => a.id === accountId);
          const item = acc && acc.items.find(i => i.id === itemId);
          if (item) updateItemAmount(fn, accountId, itemId, item.amount, true);
        }
        setConfirmDialog(null);
      };
 
      const totalFixed = (fn) => fortnightAccounts[fn].reduce((sum, acc) => sum + acc.items.reduce((s, i) => s + i.amount, 0), 0);
      const expensesForFn = (fn) => upcomingExpenses.filter(e => expenseFortnight(e.date, fortnights) === fn);
      const totalUpcoming = (fn) => expensesForFn(fn).reduce((sum, e) => sum + (parseFloat(e.amount) || 0), 0);
      const leftover = (fn) => FORTNIGHTLY_INCOME - totalFixed(fn) - totalUpcoming(fn);
 
      const addExpense = () => {
        const next = [...upcomingExpenses, { id: Date.now().toString(), description: "", amount: "", date: "" }];
        setUpcomingExpenses(next);
        scheduleSave({ fortnightStart, fortnightAccounts, upcomingExpenses: next, lockedItems: [...lockedItems] });
      };
 
      const removeExpense = (id) => {
        const next = upcomingExpenses.filter(e => e.id !== id);
        setUpcomingExpenses(next);
        scheduleSave({ fortnightStart, fortnightAccounts, upcomingExpenses: next, lockedItems: [...lockedItems] });
      };
 
      const updateExpense = (id, field, value) => {
        const next = upcomingExpenses.map(e => e.id === id ? { ...e, [field]: value } : e);
        setUpcomingExpenses(next);
        scheduleSave({ fortnightStart, fortnightAccounts, upcomingExpenses: next, lockedItems: [...lockedItems] });
      };
 
      const handleDateSave = (newStart) => {
        setFortnightStart(newStart);
        setShowDateEdit(false);
        scheduleSave({ fortnightStart: newStart, fortnightAccounts, upcomingExpenses, lockedItems: [...lockedItems] });
      };
 
      const confirmAccount = confirmDialog ? fortnightAccounts[confirmDialog.fn].find(a => a.id === confirmDialog.accountId) : null;
      const confirmItem = confirmAccount ? confirmAccount.items.find(i => i.id === confirmDialog.itemId) : null;
 
      if (!loaded) {
        return (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", flexDirection: "column", gap: 16 }}>
            <div style={{ fontSize: 32 }}>💰</div>
            <p style={{ fontFamily: "sans-serif", color: "#4a7c59", fontSize: 16 }}>Loading your budget...</p>
          </div>
        );
      }
 
      const FortnightColumn = ({ fn, compact }) => {
        const accounts = fortnightAccounts[fn];
        const fixed = totalFixed(fn);
        const upcoming = totalUpcoming(fn);
        const left = leftover(fn);
        const expenses = expensesForFn(fn);
 
        return (
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 10 }}>
              {[{ label: "Fixed", value: fixed, color: "#c0392b" }, { label: "Upcoming", value: upcoming, color: "#e67e22" }, { label: "Left", value: left, color: left >= 0 ? "#27ae60" : "#c0392b" }].map(({ label, value, color }) => (
                <div key={label} style={{ background: "white", borderRadius: 8, padding: "7px 5px", textAlign: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.07)", borderTop: `3px solid ${color}` }}>
                  <p style={{ fontSize: 8, letterSpacing: 1, color: "#888", textTransform: "uppercase", fontFamily: "sans-serif" }}>{label}</p>
                  <p style={{ marginTop: 3, fontSize: compact ? 11 : 14, fontWeight: "bold", color, fontFamily: "sans-serif" }}>{formatCurrency(value)}</p>
                </div>
              ))}
            </div>
 
            {accounts.map(account => (
              <div key={account.id} style={{ background: "white", borderRadius: 10, marginBottom: 8, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.07)" }}>
                <div style={{ background: account.color, padding: "8px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ color: "white", fontSize: 10, fontWeight: "bold", fontFamily: "sans-serif" }}>{account.label}</span>
                  <span style={{ color: "rgba(255,255,255,0.9)", fontSize: 10, fontFamily: "sans-serif" }}>{formatCurrency(account.items.reduce((s, i) => s + i.amount, 0))}</span>
                </div>
                {account.items.map(item => {
                  const cellKey = `${fn}-${account.id}-${item.id}`;
                  const labelKey = `label-${fn}-${account.id}-${item.id}`;
                  const globalKey = `${account.id}-${item.id}`;
                  const isLocked = lockedItems.has(globalKey);
                  const isJustLocked = justLocked === globalKey;
                  const isEditing = editingCell === cellKey;
                  const isEditingLabel = editingCell === labelKey;
                  return (
                    <div key={item.id} style={{ display: "flex", alignItems: "center", padding: "7px 8px", borderBottom: "1px solid #f0ece6", gap: 5, background: isJustLocked ? "#f0faf4" : "white", transition: "background 0.4s" }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        {isEditingLabel ? (
                          <input type="text" defaultValue={item.label} autoFocus
                            onBlur={e => { updateItemLabel(fn, account.id, item.id, e.target.value); setEditingCell(null); }}
                            onKeyDown={e => { if (e.key === "Enter") { updateItemLabel(fn, account.id, item.id, e.target.value); setEditingCell(null); } }}
                            style={{ width: "100%", padding: "2px 5px", border: `2px solid ${account.color}`, borderRadius: 5, fontSize: compact ? 10 : 12, fontFamily: "sans-serif" }} />
                        ) : (
                          <p onClick={() => setEditingCell(labelKey)} title="Tap to rename"
                            style={{ fontSize: compact ? 10 : 12, color: "#2c2c2c", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", cursor: "pointer", borderBottom: "1px dashed #ddd" }}>{item.label}</p>
                        )}
                        {isLocked && <span style={{ fontSize: 8, background: "#e8f5e9", color: "#4a7c59", borderRadius: 3, padding: "1px 4px", fontFamily: "sans-serif" }}>ALL</span>}
                      </div>
                      {isEditing ? (
                        <input type="number" defaultValue={item.amount} autoFocus
                          onBlur={e => { updateItemAmount(fn, account.id, item.id, e.target.value); setEditingCell(null); }}
                          onKeyDown={e => { if (e.key === "Enter") { updateItemAmount(fn, account.id, item.id, e.target.value); setEditingCell(null); } }}
                          style={{ width: 60, padding: "3px 5px", border: `2px solid ${account.color}`, borderRadius: 5, fontSize: 11, fontFamily: "sans-serif", textAlign: "right" }} />
                      ) : (
                        <button onClick={() => setEditingCell(cellKey)}
                          style={{ background: "#f7f4f0", border: "1px solid #e8e0d8", borderRadius: 5, padding: "3px 7px", fontSize: 11, fontFamily: "sans-serif", color: "#333", minWidth: 56, textAlign: "right" }}>
                          {formatCurrency(item.amount)}
                        </button>
                      )}
                      <button onClick={() => handleLockClick(fn, account.id, item.id)} title="Apply to all fortnights"
                        style={{ background: isLocked ? "#e8f5e9" : "#f5f5f5", border: isLocked ? `1.5px solid ${account.color}` : "1.5px solid #ddd", borderRadius: 5, padding: "3px 5px", fontSize: 11, lineHeight: 1 }}>
                        {isLocked ? "🔁" : "↻"}
                      </button>
                    </div>
                  );
                })}
              </div>
            ))}
 
            <div style={{ background: "white", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.07)", marginBottom: 8 }}>
              <div style={{ background: "linear-gradient(to right, #2d4a3e, #3d6b55)", padding: "8px 10px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: "white", fontSize: 10, fontWeight: "bold", fontFamily: "sans-serif" }}>Upcoming Expenses</span>
                <span style={{ color: "rgba(255,255,255,0.9)", fontSize: 10, fontFamily: "sans-serif" }}>{formatCurrency(upcoming)}</span>
              </div>
              <div style={{ padding: "8px 8px" }}>
                {expenses.length === 0 && <p style={{ fontSize: 10, color: "#bbb", fontFamily: "sans-serif", textAlign: "center", padding: "4px 0" }}>None this fortnight</p>}
                {expenses.map(exp => (
                  <div key={exp.id} style={{ display: "flex", gap: 4, marginBottom: 6, alignItems: "center", flexWrap: "wrap" }}>
                    <input type="text" placeholder="Description" value={exp.description} onChange={e => updateExpense(exp.id, "description", e.target.value)}
                      style={{ flex: 1, minWidth: "100%", padding: "5px 7px", border: "1px solid #e0d8d0", borderRadius: 6, fontSize: 10, fontFamily: "sans-serif", background: "#fdfaf7" }} />
                    <input type="date" value={exp.date} onChange={e => updateExpense(exp.id, "date", e.target.value)}
                      style={{ flex: 1, padding: "5px 5px", border: "1px solid #e0d8d0", borderRadius: 6, fontSize: 10, fontFamily: "sans-serif", background: "#fdfaf7" }} />
                    <input type="number" placeholder="$0" value={exp.amount} onChange={e => updateExpense(exp.id, "amount", e.target.value)}
                      style={{ width: 58, padding: "5px 5px", border: "1px solid #e0d8d0", borderRadius: 6, fontSize: 10, fontFamily: "sans-serif", textAlign: "right", background: "#fdfaf7" }} />
                    <button onClick={() => removeExpense(exp.id)} style={{ background: "none", border: "none", color: "#c0392b", fontSize: 15, padding: "0 1px", lineHeight: 1 }}>×</button>
                  </div>
                ))}
                <button onClick={addExpense} style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "1.5px dashed #b0a898", borderRadius: 6, padding: "5px 8px", fontSize: 10, fontFamily: "sans-serif", color: "#7a6a5a", width: "100%", justifyContent: "center", marginTop: 2 }}>
                  + Add expense
                </button>
              </div>
            </div>
 
            <div style={{ background: left >= 0 ? "linear-gradient(135deg, #2d5a3d, #4a7c59)" : "linear-gradient(135deg, #7c2d2d, #a04040)", borderRadius: 10, padding: "12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 4px 16px rgba(0,0,0,0.12)" }}>
              <p style={{ fontSize: 10, color: "rgba(255,255,255,0.8)", fontFamily: "sans-serif" }}>Available</p>
              <p style={{ fontSize: compact ? 16 : 20, fontWeight: "bold", color: "white", fontFamily: "sans-serif" }}>{formatCurrency(left)}</p>
            </div>
          </div>
        );
      };
 
      return (
        <div>
          {confirmDialog && confirmItem && confirmAccount && (
            <ConfirmDialog item={confirmItem} accountColor={confirmAccount.color} onConfirm={handleConfirmLock} onCancel={() => setConfirmDialog(null)} />
          )}
          {showDateEdit && (
            <DateEditModal fortnights={fortnights} onSave={handleDateSave} onCancel={() => setShowDateEdit(false)} />
          )}
 
          <div style={{ background: "linear-gradient(to right, #2d4a3e, #3d6b55)", padding: "20px 18px 14px", color: "white", boxShadow: "0 4px 20px rgba(0,0,0,0.15)" }}>
            <div style={{ maxWidth: 1000, margin: "0 auto" }}>
              <p style={{ fontSize: 10, letterSpacing: 3, opacity: 0.7, textTransform: "uppercase", fontFamily: "sans-serif" }}>Fortnightly Budget</p>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 3 }}>
                <h1 style={{ fontSize: 22, fontWeight: "normal", letterSpacing: 0.5 }}>Jacinda's Tracker</h1>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setShowDateEdit(true)} style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8, padding: "6px 12px", color: "white", fontSize: 12, fontFamily: "sans-serif" }}>📅 Dates</button>
                  <button onClick={() => setSplitView(!splitView)} style={{ background: splitView ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8, padding: "6px 12px", color: "white", fontSize: 12, fontFamily: "sans-serif" }}>{splitView ? "⊟ Single" : "⊞ Split"}</button>
                </div>
              </div>
              <p style={{ marginTop: 3, fontSize: 12, opacity: 0.75, fontFamily: "sans-serif" }}>Income: {formatCurrency(FORTNIGHTLY_INCOME)} · {fortnights[0].label}</p>
            </div>
          </div>
 
          <div style={{ maxWidth: 1000, margin: "0 auto", padding: "14px 14px 40px" }}>
            {!splitView && (
              <>
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  {fortnights.map((f, fn) => (
                    <button key={fn} onClick={() => setActiveFortnight(fn)} style={{ flex: 1, padding: "10px 0", borderRadius: 9, border: activeFortnight === fn ? "2px solid #3d6b55" : "2px solid #ddd", background: activeFortnight === fn ? "#3d6b55" : "white", color: activeFortnight === fn ? "white" : "#666", fontSize: 12, fontFamily: "sans-serif", fontWeight: activeFortnight === fn ? "bold" : "normal" }}>
                      {f.label}
                    </button>
                  ))}
                </div>
                <FortnightColumn fn={activeFortnight} compact={false} />
              </>
            )}
            {splitView && (
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                {fortnights.map((f, fn) => (
                  <div key={fn} style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ marginBottom: 10, fontSize: 10, fontFamily: "sans-serif", color: "#555", fontWeight: "bold", letterSpacing: 1.5, textTransform: "uppercase", textAlign: "center", background: "white", borderRadius: 8, padding: "8px", boxShadow: "0 2px 8px rgba(0,0,0,0.07)" }}>
                      FN {fn + 1} · {f.label}
                    </p>
                    <FortnightColumn fn={fn} compact={true} />
                  </div>
                ))}
              </div>
            )}
            <p style={{ textAlign: "center", fontSize: 10, color: "#bbb", marginTop: 18, fontFamily: "sans-serif", letterSpacing: 0.8 }}>TAP AMOUNT TO EDIT · ↻ TO APPLY TO ALL FORTNIGHTS</p>
          </div>
        </div>
      );
    }
 
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
